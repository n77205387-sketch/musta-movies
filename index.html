<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSTA MOVIES UG - Premium Ugandan Streaming</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e27; color: #fff; }
        .movie-card { 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 8px;
            overflow: hidden;
            background: #1a1f3a;
        }
        .movie-card:hover { transform: scale(1.08); box-shadow: 0 8px 16px rgba(220, 38, 38, 0.6); }
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .modal { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(5px); }
        .auth-form { max-width: 450px; margin: 0 auto; }
        .btn-primary { background: #dc2626; transition: all 0.3s; }
        .btn-primary:hover { background: #b91c1c; transform: translateY(-2px); }
        .header-grad { background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%); }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        @media (max-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; } }
        .stat-card { background: linear-gradient(135deg, #1a1f3a 0%, #2a2f4a 100%); border-left: 4px solid #dc2626; }
        .video-player { width: 100%; max-width: 100%; aspect-ratio: 16/9; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = 'http://localhost:3000/api';

        function MustaMovies() {
            const [user, setUser] = useState(null);
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authMode, setAuthMode] = useState('login');
            const [movies, setMovies] = useState([]);
            const [selectedMovie, setSelectedMovie] = useState(null);
            const [loading, setLoading] = useState(false);
            const [videoUrl, setVideoUrl] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("All");
            const [userRating, setUserRating] = useState(0);
            const [paymentModal, setPaymentModal] = useState(false);
            const [adminView, setAdminView] = useState(false);
            const [stats, setStats] = useState(null);
            const [currentView, setCurrentView] = useState("movies");
            const [selectedDJ, setSelectedDJ] = useState(null);
            const [uploadTab, setUploadTab] = useState("music");
            const [uploadProgress, setUploadProgress] = useState(0);
            const [uploadedFiles, setUploadedFiles] = useState([]);

            const categories = ["All", "Action", "Romance", "Horror", "Comedy", "Drama", "Adventure", "Thriller", "Animation"];
            
            const djFolders = ["DJ Musta", "DJ Henzoo", "DJ Muteesa", "DJ Zero Pro"];
            
            const ugandanArtists = [
                "Bebe Cool", "Eddy Kenzo", "Bobi Wine", "Rema", "Mesach Semakula",
                "Sheebah Karungi", "Cindy Sanyu", "Juliana Kanyomozi", "Lydia Jazmine", "Vinka",
                "Spice Diana", "Fatherhood", "Mesach Ssemakula", "GNL Zamba", "Mun G",
                "Gravity Omutujju", "Apassi", "Ekyogera", "Chameleone", "King Saha",
                "Niwasha", "Rayban", "Alien Skin", "King Saha", "Pallaso",
                "Weasel", "Radio Weasel", "Goodlyfe Crew", "Ykee Benda", "Ntege",
                "Aguette", "Sasha Grey", "Susan Makula", "Fille Mutoni", "Iryn Namubiru"
            ];
            
            const mixtapes = [
                { dj: "DJ Musta", count: 24, latest: "Summer Vibes Mix 2026" },
                { dj: "DJ Henzoo", count: 18, latest: "Kampala Nights" },
                { dj: "DJ Muteesa", count: 31, latest: "Classics Complete" },
                { dj: "DJ Zero Pro", count: 22, latest: "Underground Session" }
            ];

            // Load user on mount
            useEffect(() => {
                if (token) {
                    loadUser();
                    loadMovies();
                }
            }, [token]);

            async function loadUser() {
                try {
                    const res = await fetch(`${API_URL}/auth/me`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const data = await res.json();
                    setUser(data);
                    setShowAuthModal(false);
                } catch (err) {
                    console.log('Error loading user:', err);
                }
            }

            async function loadMovies() {
                try {
                    setLoading(true);
                    const res = await fetch(`${API_URL}/movies`);
                    const data = await res.json();
                    setMovies(data);
                } catch (err) {
                    console.error('Error loading movies:', err);
                } finally {
                    setLoading(false);
                }
            }

            async function loadAdminStats() {
                try {
                    const res = await fetch(`${API_URL}/admin/stats`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const data = await res.json();
                    setStats(data);
                } catch (err) {
                    console.error('Error loading stats:', err);
                }
            }

            async function handleAuth(e) {
                e.preventDefault();
                const formData = new FormData(e.target);
                const endpoint = authMode === 'login' ? 'login' : 'register';

                try {
                    const res = await fetch(`${API_URL}/auth/${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: formData.get('username') || formData.get('email').split('@')[0],
                            email: formData.get('email'),
                            password: formData.get('password')
                        })
                    });
                    const data = await res.json();

                    if (res.ok && data.token) {
                        localStorage.setItem('token', data.token);
                        setToken(data.token);
                        setShowAuthModal(false);
                    } else {
                        alert(data.error || 'Authentication failed');
                    }
                } catch (err) {
                    alert('Server error. Make sure the backend is running: npm start');
                }
            }

            async function handleWatchClick(movie) {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                setSelectedMovie(movie);
                setLoading(true);
                
                try {
                    const res = await fetch(`${API_URL}/movies/${movie._id}/watch`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        setVideoUrl(data.videoUrl);
                        setLoading(false);
                    } else {
                        setLoading(false);
                        setPaymentModal(true);
                    }
                } catch (error) {
                    setLoading(false);
                    setPaymentModal(true);
                }
            }

            function handleMusicDownload() {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                alert('🎵 Downloading music...');
            }

            function handleMovieDownload(movie) {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                alert(`⬇️ Downloading ${movie.title}...`);
            }

            function handleMixtapeDownload() {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                alert('💿 Downloading mixtape...');
            }

            async function handleMovieUpload(e) {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                
                const files = e.target.files;
                if (files.length === 0) return;

                for (let file of files) {
                    // Simulate upload progress
                    setUploadProgress(0);
                    const interval = setInterval(() => {
                        setUploadProgress(prev => {
                            if (prev >= 90) {
                                clearInterval(interval);
                                return prev;
                            }
                            return prev + Math.random() * 30;
                        });
                    }, 300);

                    try {
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('type', 'movie');

                        const res = await fetch(`${API_URL}/upload/movie`, {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${token}` },
                            body: formData
                        });

                        clearInterval(interval);
                        setUploadProgress(100);

                        if (res.ok) {
                            const data = await res.json();
                            setUploadedFiles([...uploadedFiles, { type: 'movie', name: file.name, size: file.size, url: data.url, uploadedAt: new Date() }]);
                            setTimeout(() => setUploadProgress(0), 1000);
                        } else {
                            alert('Upload failed: ' + file.name);
                            setUploadProgress(0);
                        }
                    } catch (err) {
                        clearInterval(interval);
                        alert('Error uploading ' + file.name + ': ' + err.message);
                        setUploadProgress(0);
                    }
                }
                e.target.value = '';
            }

            async function handleMusicUpload(e) {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                
                const files = e.target.files;
                if (files.length === 0) return;

                for (let file of files) {
                    // Simulate upload progress
                    setUploadProgress(0);
                    const interval = setInterval(() => {
                        setUploadProgress(prev => {
                            if (prev >= 90) {
                                clearInterval(interval);
                                return prev;
                            }
                            return prev + Math.random() * 30;
                        });
                    }, 300);

                    try {
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('type', 'music');

                        const res = await fetch(`${API_URL}/upload/music`, {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${token}` },
                            body: formData
                        });

                        clearInterval(interval);
                        setUploadProgress(100);

                        if (res.ok) {
                            const data = await res.json();
                            setUploadedFiles([...uploadedFiles, { type: 'music', name: file.name, size: file.size, url: data.url, uploadedAt: new Date() }]);
                            setTimeout(() => setUploadProgress(0), 1000);
                        } else {
                            alert('Upload failed: ' + file.name);
                            setUploadProgress(0);
                        }
                    } catch (err) {
                        clearInterval(interval);
                        alert('Error uploading ' + file.name + ': ' + err.message);
                        setUploadProgress(0);
                    }
                }
                e.target.value = '';
            }

            async function handleMixtapeUpload(e) {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                
                const files = e.target.files;
                if (files.length === 0) return;

                for (let file of files) {
                    // Simulate upload progress
                    setUploadProgress(0);
                    const interval = setInterval(() => {
                        setUploadProgress(prev => {
                            if (prev >= 90) {
                                clearInterval(interval);
                                return prev;
                            }
                            return prev + Math.random() * 30;
                        });
                    }, 300);

                    try {
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('type', 'mixtape');
                        formData.append('djName', user.username);

                        const res = await fetch(`${API_URL}/upload/mixtape`, {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${token}` },
                            body: formData
                        });

                        clearInterval(interval);
                        setUploadProgress(100);

                        if (res.ok) {
                            const data = await res.json();
                            setUploadedFiles([...uploadedFiles, { type: 'mixtape', name: file.name, size: file.size, url: data.url, djName: user.username, uploadedAt: new Date() }]);
                            setTimeout(() => setUploadProgress(0), 1000);
                        } else {
                            alert('Upload failed: ' + file.name);
                            setUploadProgress(0);
                        }
                    } catch (err) {
                        clearInterval(interval);
                        alert('Error uploading ' + file.name + ': ' + err.message);
                        setUploadProgress(0);
                    }
                }
                e.target.value = '';
            }

            async function rateMovie(rating) {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                if (!selectedMovie) return;
                try {
                    const res = await fetch(`${API_URL}/movies/${selectedMovie._id}/rate`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            Authorization: `Bearer ${token}`
                        },
                        body: JSON.stringify({ rating })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setUserRating(rating);
                        alert('✅ Rating saved!');
                    }
                } catch (err) {
                    console.error('Error rating movie:', err);
                }
            }

            async function initiatePayment(amount, phoneNumber) {
                if (!token) {
                    setShowAuthModal(true);
                    return;
                }
                try {
                    const res = await fetch(`${API_URL}/payment/mpesa/initiate`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            Authorization: `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            amount,
                            phoneNumber,
                            movieId: selectedMovie._id,
                            transactionType: 'movie_rental'
                        })
                    });
                    const data = await res.json();
                    alert(`✅ ${data.message}\n\nTransaction ID: ${data.transactionId}\n\nEnter your M-Pesa PIN on your phone.`);
                } catch (err) {
                    alert('Payment error: ' + err.message);
                }
            }

            const handleLogout = () => {
                localStorage.removeItem('token');
                setToken(null);
                setUser(null);
                setShowAuthModal(true);
                setAdminView(false);
            };

            const filteredMovies = movies.filter(movie => {
                const matchesSearch = movie.title.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesCategory = selectedCategory === "All" || movie.genre === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            // Auth Modal
            if (showAuthModal) {
                return (
                    <div className="modal fixed inset-0 flex items-center justify-center z-50 p-4">
                        <div className="bg-gray-900 rounded-lg p-8 auth-form border border-red-600 shadow-2xl">
                            <div className="text-center mb-6">
                                <h2 className="text-4xl font-bold mb-2 text-red-600">🎬 MUSTA MOVIES</h2>
                                <p className="text-sm text-gray-400">Premium Ugandan Streaming Platform</p>
                            </div>
                            
                            <div className="flex gap-4 mb-6">
                                <button 
                                    onClick={() => setAuthMode('login')}
                                    className={`flex-1 py-2 rounded-lg font-semibold transition ${authMode === 'login' ? 'bg-red-600' : 'bg-gray-700'}`}
                                >
                                    Login
                                </button>
                                <button 
                                    onClick={() => setAuthMode('register')}
                                    className={`flex-1 py-2 rounded-lg font-semibold transition ${authMode === 'register' ? 'bg-red-600' : 'bg-gray-700'}`}
                                >
                                    Sign Up
                                </button>
                            </div>

                            <form onSubmit={handleAuth} className="mb-6">
                                <div className="mb-4">
                                    <input 
                                        type="email" 
                                        name="email"
                                        placeholder="Email" 
                                        required
                                        className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white"
                                    />
                                </div>
                                <div className="mb-6">
                                    <input 
                                        type="password" 
                                        name="password"
                                        placeholder="Password" 
                                        required
                                        className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white"
                                    />
                                </div>
                                <button type="submit" className="w-full btn-primary py-2 rounded-lg font-bold">
                                    {authMode === 'login' ? 'Login' : 'Sign Up'}
                                </button>
                            </form>

                            <p className="text-xs text-gray-400 text-center border-t border-gray-700 pt-4">
                                <strong>Demo Credentials:</strong><br/>
                                📧 admin@mustamovies.com / AdminPassword123!<br/>
                                📧 demo@mustamovies.com / DemoPassword123!
                            </p>
                        </div>
                    </div>
                );
            }

            // Admin View
            if (adminView && user?.isAdmin) {
                if (!stats) loadAdminStats();

                return (
                    <div className="bg-gray-900 min-h-screen p-6">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-3xl font-bold text-red-600">👨‍💼 Admin Dashboard</h1>
                            <button 
                                onClick={() => setAdminView(false)}
                                className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg"
                            >
                                ← Back
                            </button>
                        </div>

                        {stats && (
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                                <div className="stat-card p-6 rounded-lg">
                                    <h3 className="text-gray-400 text-sm mb-2">Total Users</h3>
                                    <p className="text-3xl font-bold">{stats.totalUsers}</p>
                                </div>
                                <div className="stat-card p-6 rounded-lg">
                                    <h3 className="text-gray-400 text-sm mb-2">Total Movies</h3>
                                    <p className="text-3xl font-bold">{stats.totalMovies}</p>
                                </div>
                                <div className="stat-card p-6 rounded-lg">
                                    <h3 className="text-gray-400 text-sm mb-2">Total Revenue</h3>
                                    <p className="text-3xl font-bold">{stats.totalRevenue.toLocaleString()} UGX</p>
                                </div>
                                <div className="stat-card p-6 rounded-lg">
                                    <h3 className="text-gray-400 text-sm mb-2">Transactions</h3>
                                    <p className="text-3xl font-bold">{stats.totalTransactions}</p>
                                </div>
                            </div>
                        )}

                        <div className="bg-gray-800 p-6 rounded-lg">
                            <h2 className="text-xl font-bold mb-4">📊 Analytics</h2>
                            <p className="text-gray-400">More detailed analytics coming soon...</p>
                        </div>
                    </div>
                );
            }

            // Main App
            return (
                <div className="bg-gray-900 text-white min-h-screen">
                    {/* Header */}
                    <header className="header-grad p-6 shadow-lg sticky top-0 z-40">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-6">
                                <h1 className="text-4xl font-bold">🎬 MUSTA MOVIES</h1>
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => { setCurrentView("movies"); setSelectedCategory("All"); }}
                                        className={`px-4 py-2 rounded-lg font-semibold transition ${currentView === "movies" ? 'bg-red-600' : 'bg-gray-700 hover:bg-gray-600'}`}
                                    >
                                        🎬 Movies
                                    </button>
                                    <button 
                                        onClick={() => { setCurrentView("music"); setSelectedCategory("All"); }}
                                        className={`px-4 py-2 rounded-lg font-semibold transition ${currentView === "music" ? 'bg-green-600' : 'bg-gray-700 hover:bg-gray-600'}`}
                                    >
                                        🎵 Music
                                    </button>
                                    <button 
                                        onClick={() => { setCurrentView("mixtape"); setSelectedDJ(null); }}
                                        className={`px-4 py-2 rounded-lg font-semibold transition ${currentView === "mixtape" ? 'bg-purple-600' : 'bg-gray-700 hover:bg-gray-600'}`}
                                    >
                                        🎚️ Mixtape
                                    </button>
                                    {user && (
                                        <button 
                                            onClick={() => setCurrentView("upload")}
                                            className={`px-4 py-2 rounded-lg font-semibold transition ${currentView === "upload" ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}`}
                                        >
                                            ⬆️ Upload
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                {user && (
                                    <>
                                        <span className="text-sm">Welcome, <span className="font-bold text-yellow-400">{user.username}</span>!</span>
                                        {user.isAdmin && (
                                            <button 
                                                onClick={() => setAdminView(true)}
                                                className="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg font-semibold transition"
                                            >
                                                👨‍💼 Admin
                                            </button>
                                        )}
                                        <button 
                                            onClick={handleLogout}
                                            className="btn-primary px-6 py-2 rounded-lg font-semibold"
                                        >
                                            Logout
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* Search Bar */}
                        <input 
                            type="text" 
                            placeholder={currentView === "movies" ? "🔍 Search movies..." : currentView === "music" ? "🔍 Search artists..." : currentView === "mixtape" ? "🔍 Search DJ..." : "🔍 Search files..."} 
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full px-4 py-3 rounded-lg bg-gray-800 text-white placeholder-gray-400 border border-gray-600"
                        />
                    </header>

                    {/* User Status */}
                    {user && (
                        <div className="bg-gray-800 px-6 py-3 border-b border-red-600">
                            <p className="text-sm">
                                Status: <span className={user.isPaid ? 'text-green-400 font-bold' : 'text-yellow-400 font-bold'}>
                                    {user.isPaid ? '✓ Premium Access' : '◯ Free Account'}
                                </span>
                                {user.subscriptionEnd && ` (Expires: ${new Date(user.subscriptionEnd).toLocaleDateString()})`}
                                <span className="ml-6 text-gray-400">Current: <span className="text-white font-semibold">{currentView === "movies" ? "🎬 Movies" : currentView === "music" ? "🎵 Music" : currentView === "mixtape" ? "🎚️ Mixtape" : "⬆️ Upload"}</span></span>
                            </p>
                        </div>
                    )}

                    {/* Category Filter */}
                    {currentView !== "upload" && (
                    <section className="px-6 py-4 flex gap-3 overflow-x-auto">
                        {currentView === "movies" && categories.map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setSelectedCategory(cat)}
                                className={`px-4 py-2 rounded-full whitespace-nowrap transition ${
                                    selectedCategory === cat 
                                        ? 'bg-red-600 text-white' 
                                        : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                                }`}
                            >
                                {cat}
                            </button>
                        ))}
                    </section>
                    )}

                    {/* Movies Grid */}
                    <section className="px-6 py-8">
                        {currentView === "movies" && (
                            <>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold">
                                {searchTerm ? `Search Results (${filteredMovies.length})` : "Trending Now 🔥"}
                            </h2>
                            <input 
                                type="file" 
                                id="movie-upload"
                                onChange={handleMovieUpload}
                                accept="video/*,.mp4,.mkv,.avi"
                                multiple
                                className="hidden"
                            />
                            <label htmlFor="movie-upload" className="inline-block">
                                <button className="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-lg font-bold cursor-pointer transition">
                                    ⬆️ Upload Movie
                                </button>
                            </label>
                        </div>
                        
                        {loading ? (
                            <div className="flex justify-center items-center h-64">
                                <div className="loading text-center">
                                    <p className="text-lg">Loading movies...</p>
                                </div>
                            </div>
                        ) : filteredMovies.length > 0 ? (
                            <div className="movie-grid">
                                {filteredMovies.map(movie => (
                                    <div key={movie._id} className="relative group">
                                        <div className="movie-card relative overflow-hidden bg-gray-800">
                                            <img 
                                                src={movie.image || 'https://via.placeholder.com/200x300?text=' + movie.title} 
                                                alt={movie.title} 
                                                className="w-full h-64 object-cover"
                                            />
                                            <div className="absolute inset-0 bg-black bg-opacity-60 flex items-center justify-center gap-3 opacity-0 group-hover:opacity-100 transition">
                                                <button 
                                                    onClick={() => handleWatchClick(movie)}
                                                    className="btn-primary px-4 py-2 rounded-lg font-bold"
                                                >
                                                    ▶ Watch
                                                </button>
                                                <button 
                                                    onClick={() => handleMovieDownload(movie)}
                                                    className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-bold transition"
                                                >
                                                    ⬇️ Download
                                                </button>
                                            </div>
                                        </div>
                                        <p className="mt-3 text-sm font-semibold truncate">{movie.title}</p>
                                        <p className="text-xs text-gray-400">{movie.genre} • {movie.price} UGX • ⭐ {(movie.rating || 4.5).toFixed(1)}</p>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center text-gray-400 py-12">
                                <p className="text-lg">No movies found</p>
                            </div>
                        )}
                            </>
                        )}

                        {currentView === "music" && (
                            <>
                        <h2 className="text-2xl font-bold mb-6">🎵 Ugandan Artists Music Library</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {ugandanArtists
                                .filter(artist => artist.toLowerCase().includes(searchTerm.toLowerCase()))
                                .map((artist, idx) => (
                                    <div key={idx} className="bg-gradient-to-br from-green-600 to-green-800 rounded-lg p-6 hover:shadow-lg transition transform hover:scale-105 cursor-pointer">
                                        <div className="text-4xl mb-3">🎤</div>
                                        <h3 className="text-xl font-bold mb-2">{artist}</h3>
                                        <p className="text-sm text-gray-200 mb-4">Popular Ugandan Artist</p>
                                        <button onClick={handleMusicDownload} className="w-full bg-white text-green-700 font-bold py-2 rounded-lg hover:bg-gray-100 transition">
                                            🎵 Download Music
                                        </button>
                                    </div>
                                ))}
                        </div>
                            </>
                        )}

                        {currentView === "mixtape" && (
                            <>
                        <h2 className="text-2xl font-bold mb-6">🎚️ DJ Mixtape Collections</h2>
                        
                        {!selectedDJ ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {djFolders.map((dj, idx) => {
                                    const mixtapeData = mixtapes[idx];
                                    return (
                                        <div key={dj} className="bg-gradient-to-br from-purple-600 to-purple-800 rounded-lg p-6 hover:shadow-lg transition transform hover:scale-105 cursor-pointer" onClick={() => setSelectedDJ(dj)}>
                                            <div className="text-5xl mb-4">👨‍🎤</div>
                                            <h3 className="text-2xl font-bold mb-2">{dj}</h3>
                                            <p className="text-sm text-gray-200 mb-2">📁 {mixtapeData.count} Mixtapes</p>
                                            <p className="text-xs text-purple-200 mb-4">Latest: {mixtapeData.latest}</p>
                                            <button className="w-full bg-white text-purple-700 font-bold py-2 rounded-lg hover:bg-gray-100 transition">
                                                VIEW COLLECTION
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div>
                                <button 
                                    onClick={() => setSelectedDJ(null)}
                                    className="mb-6 bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg font-semibold transition"
                                >
                                    ← Back to DJs
                                </button>
                                <h3 className="text-3xl font-bold mb-8">{selectedDJ} Mixtape Collection 🎚️</h3>
                                <input 
                                    type="file" 
                                    id="mixtape-upload-collection"
                                    onChange={handleMixtapeUpload}
                                    accept="audio/*,.mp3,.wav,.m4a,.flac"
                                    multiple
                                    className="hidden"
                                />
                                <label htmlFor="mixtape-upload-collection" className="inline-block">
                                    <button className="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-lg font-bold cursor-pointer transition">
                                        ⬆️ Upload Mixtape
                                    </button>
                                </label>
                            </div>
                        )}
                            </>
                        )}

                        {currentView === "upload" && (
                            <>
                        <h2 className="text-2xl font-bold mb-8">⬆️ Upload Music & Mixtapes</h2>
                        
                        {/* Upload Tabs */}
                        <div className="flex gap-4 mb-8">
                            <button 
                                onClick={() => setUploadTab("music")}
                                className={`px-6 py-3 rounded-lg font-semibold transition ${uploadTab === "music" ? 'bg-green-600' : 'bg-gray-700 hover:bg-gray-600'}`}
                            >
                                🎵 Upload Music
                            </button>
                            <button 
                                onClick={() => setUploadTab("mixtape")}
                                className={`px-6 py-3 rounded-lg font-semibold transition ${uploadTab === "mixtape" ? 'bg-purple-600' : 'bg-gray-700 hover:bg-gray-600'}`}
                            >
                                🎚️ Upload Mixtape
                            </button>
                        </div>

                        {/* Music Upload */}
                        {uploadTab === "music" && (
                            <div className="bg-gray-800 p-8 rounded-lg max-w-2xl">
                                <h3 className="text-xl font-bold mb-4">🎵 Upload Music Files</h3>
                                <p className="text-gray-400 mb-6">Share your favorite Ugandan music tracks with the community</p>
                                
                                <div className="mb-6 p-8 border-2 border-dashed border-green-600 rounded-lg text-center hover:bg-gray-700 transition cursor-pointer">
                                    <input 
                                        type="file" 
                                        id="music-upload"
                                        onChange={handleMusicUpload}
                                        accept="audio/*,.mp3,.wav,.m4a,.flac"
                                        multiple
                                        className="hidden"
                                    />
                                    <label htmlFor="music-upload" className="cursor-pointer block">
                                        <div className="text-4xl mb-3">🎶</div>
                                        <p className="font-semibold text-lg mb-2">Click to upload music files</p>
                                        <p className="text-sm text-gray-400">MP3, WAV, M4A, FLAC supported</p>
                                    </label>
                                </div>

                                {uploadProgress > 0 && uploadProgress < 100 && (
                                    <div className="mb-6">
                                        <p className="text-sm font-semibold mb-2">Upload Progress: {Math.round(uploadProgress)}%</p>
                                        <div className="w-full bg-gray-700 rounded-full h-2">
                                            <div 
                                                className="bg-green-600 h-2 rounded-full transition-all"
                                                style={{ width: `${uploadProgress}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                )}

                                {uploadProgress === 100 && (
                                    <div className="mb-6 p-4 bg-green-600 bg-opacity-20 border border-green-600 rounded-lg text-green-400">
                                        ✓ Upload completed successfully!
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Mixtape Upload */}
                        {uploadTab === "mixtape" && (
                            <div className="bg-gray-800 p-8 rounded-lg max-w-2xl">
                                <h3 className="text-xl font-bold mb-4">🎚️ Upload Mixtape</h3>
                                <p className="text-gray-400 mb-6">Create and share your own DJ mixtape with listeners</p>
                                
                                <div className="mb-6 p-8 border-2 border-dashed border-purple-600 rounded-lg text-center hover:bg-gray-700 transition cursor-pointer">
                                    <input 
                                        type="file" 
                                        id="mixtape-upload"
                                        onChange={handleMixtapeUpload}
                                        accept="audio/*,.mp3,.wav,.m4a,.flac"
                                        multiple
                                        className="hidden"
                                    />
                                    <label htmlFor="mixtape-upload" className="cursor-pointer block">
                                        <div className="text-4xl mb-3">💿</div>
                                        <p className="font-semibold text-lg mb-2">Click to upload mixtape files</p>
                                        <p className="text-sm text-gray-400">MP3, WAV, M4A, FLAC supported</p>
                                    </label>
                                </div>

                                {uploadProgress > 0 && uploadProgress < 100 && (
                                    <div className="mb-6">
                                        <p className="text-sm font-semibold mb-2">Upload Progress: {Math.round(uploadProgress)}%</p>
                                        <div className="w-full bg-gray-700 rounded-full h-2">
                                            <div 
                                                className="bg-purple-600 h-2 rounded-full transition-all"
                                                style={{ width: `${uploadProgress}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                )}

                                {uploadProgress === 100 && (
                                    <div className="mb-6 p-4 bg-purple-600 bg-opacity-20 border border-purple-600 rounded-lg text-purple-400">
                                        ✓ Upload completed successfully!
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Uploaded Files */}
                        {uploadedFiles.length > 0 && (
                            <div className="mt-12 max-w-4xl">
                                <h3 className="text-xl font-bold mb-6">📁 Your Uploaded Files</h3>
                                <div className="space-y-3">
                                    {uploadedFiles.map((file, idx) => (
                                        <div key={idx} className="bg-gray-800 p-4 rounded-lg flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <span className="text-2xl">{file.type === 'music' ? '🎵' : '💿'}</span>
                                                <div>
                                                    <p className="font-semibold">{file.name}</p>
                                                    <p className="text-sm text-gray-400">{(file.size / 1024 / 1024).toFixed(2)} MB • {file.uploadedAt.toLocaleDateString()}</p>
                                                </div>
                                            </div>
                                            <span className={`px-3 py-1 rounded-full text-sm font-semibold ${file.type === 'music' ? 'bg-green-600 bg-opacity-30 text-green-400' : 'bg-purple-600 bg-opacity-30 text-purple-400'}`}>
                                                {file.type === 'music' ? '🎶 Music' : '🎚️ Mixtape'}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                            </>
                        )}
                    </section>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-gray-400 text-center py-6 mt-12 border-t border-gray-700">
                        <p>&copy; 2026 MUSTA MOVIES UG. All rights reserved.</p>
                        <p className="text-sm mt-2">Premium Ugandan Entertainment Platform</p>
                        <p className="text-xs mt-3 text-gray-500">🎬 Movies • 🎵 Music Downloads • 🎚️ DJ Mixtapes</p>
                    </footer>

                    {/* Movie Player Modal */}
                    {selectedMovie && !paymentModal && (
                        <div className="fixed inset-0 modal flex items-center justify-center z-50 p-4">
                            <div className="bg-gray-900 rounded-lg max-w-4xl w-full p-6 max-h-screen overflow-y-auto">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-2xl font-bold">{selectedMovie.title}</h3>
                                    <button 
                                        onClick={() => setSelectedMovie(null)}
                                        className="text-gray-400 hover:text-white text-2xl"
                                    >
                                        ✕
                                    </button>
                                </div>

                                {loading ? (
                                    <div className="bg-gray-800 rounded h-96 flex items-center justify-center loading">
                                        <p className="text-lg">Loading...</p>
                                    </div>
                                ) : videoUrl ? (
                                    <div className="bg-gray-800 rounded overflow-hidden">
                                        <video 
                                            className="video-player"
                                            controls
                                            autoPlay
                                        >
                                            <source src={videoUrl} type="video/mp4" />
                                            Your browser does not support the video tag.
                                        </video>
                                        <div className="p-4">
                                            <p className="mb-4 font-semibold">{selectedMovie.description}</p>
                                            <div className="flex items-center gap-2 mb-4">
                                                <span className="font-semibold">Rate this movie:</span>
                                                {[1, 2, 3, 4, 5].map(star => (
                                                    <button 
                                                        key={star}
                                                        onClick={() => rateMovie(star)}
                                                        className={`text-2xl ${star <= userRating ? 'text-yellow-400' : 'text-gray-600'}`}
                                                    >
                                                        ⭐
                                                    </button>
                                                ))}
                                            </div>
                                            <p className="text-sm text-gray-400">Duration: {selectedMovie.duration} min • {selectedMovie.year} • {selectedMovie.genre}</p>
                                        </div>
                                    </div>
                                ) : null}
                            </div>
                        </div>
                    )}

                    {/* Payment Modal */}
                    {paymentModal && selectedMovie && (
                        <div className="fixed inset-0 modal flex items-center justify-center z-50 p-4">
                            <div className="bg-gray-900 rounded-lg max-w-md w-full p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-2xl font-bold">💳 Payment Required</h3>
                                    <button 
                                        onClick={() => setPaymentModal(false)}
                                        className="text-gray-400 hover:text-white text-2xl"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <div className="bg-gray-800 p-4 rounded mb-6">
                                    <p className="text-sm text-gray-400 mb-2">Movie: {selectedMovie.title}</p>
                                    <p className="text-3xl font-bold text-red-600">{selectedMovie.price} UGX</p>
                                </div>

                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const phone = e.target.phone.value;
                                    initiatePayment(selectedMovie.price, phone);
                                    setPaymentModal(false);
                                }}>
                                    <div className="mb-4">
                                        <label className="block text-sm mb-2">Phone Number (M-Pesa)</label>
                                        <input 
                                            type="tel" 
                                            name="phone"
                                            placeholder="256701234567"
                                            required
                                            className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white"
                                        />
                                    </div>
                                    <button type="submit" className="w-full btn-primary py-2 rounded-lg font-bold">
                                        💰 Pay with M-Pesa
                                    </button>
                                </form>

                                <p className="text-xs text-gray-400 text-center mt-4">
                                    You'll receive an M-Pesa prompt on your phone. Enter your PIN to complete payment.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MustaMovies />);
    </script>
</body>
</html>
